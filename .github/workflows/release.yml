name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $shortSha = "${env:GITHUB_SHA}".Substring(0, 7)

          if ("${env:GITHUB_REF_TYPE}" -eq "tag") {
            $tagName = "${env:GITHUB_REF_NAME}"
            $releaseName = "${env:GITHUB_REF_NAME}"
            $prerelease = "false"
            $artifactName = "WinAiBuddy-${env:GITHUB_REF_NAME}-win-x64.zip"
            $releaseNotes = "Automated release for tag ${env:GITHUB_REF_NAME}."
          }
          else {
            $tagName = "main-${env:GITHUB_RUN_NUMBER}-$shortSha"
            $releaseName = "main build ${env:GITHUB_RUN_NUMBER}"
            $prerelease = "true"
            $artifactName = "WinAiBuddy-main-$shortSha-win-x64.zip"
            $releaseNotes = "Automated prerelease from main (${env:GITHUB_SHA})."
          }

          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "release_notes=$releaseNotes" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore WinAiBuddy.sln

      - name: Publish WinAiBuddy
        run: >
          dotnet publish .\src\WinAiBuddy\WinAiBuddy.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o .\artifacts\publish\win-x64

      - name: Package release
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "artifacts\publish\win-x64"
          $zipPath = Join-Path $PWD "artifacts\${{ steps.meta.outputs.artifact_name }}"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zipPath

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/${{ steps.meta.outputs.artifact_name }}
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.meta.outputs.release_notes }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/${{ steps.meta.outputs.artifact_name }}
          fail_on_unmatched_files: true
