<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>Win AI Buddy Icon V2</title>
  <desc>A bold, highly visible stylized spark icon designed for maximum tray readability.</desc>
  <defs>
    <!-- Background: Deep Space/Tech (dark enough so bright colors pop) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29" />
      <stop offset="50%" stop-color="#302B63" />
      <stop offset="100%" stop-color="#24243E" />
    </linearGradient>

    <!-- Gemini Spark Gradient for the main shape (Pink/Purple/Cyan) -->
    <linearGradient id="sparkGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5AF5D2" />   <!-- Cyan   -->
      <stop offset="33%" stop-color="#2CC8FF" />  <!-- Light Blue -->
      <stop offset="66%" stop-color="#D766FF" />  <!-- Pink/Purple -->
      <stop offset="100%" stop-color="#FF7597" /> <!-- Peach/Red  -->
    </linearGradient>
  </defs>

  <!-- Solid Background for high contrast even in dark mode -->
  <rect x="0" y="0" width="256" height="256" rx="60" fill="url(#bg)" />

  <!-- 
    The Main Spark Shape: 
    A thick, bold four-pointed star with a hollow center (speech bubble/eye vibe).
    It is massive and simple so it reads perfectly at 16x16 pixels.
  -->
  <path d="M128 32 C128 80, 176 128, 224 128 C176 128, 128 176, 128 224 C128 176, 80 128, 32 128 C80 128, 128 80, 128 32 Z" 
        fill="url(#sparkGlow)" />
        
  <!-- Core cutout for an extra dimension of light/dark -->
  <circle cx="128" cy="128" r="32" fill="url(#bg)" />
  <circle cx="128" cy="128" r="16" fill="#5AF5D2" />

</svg>
